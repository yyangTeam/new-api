name: Build and Push Docker Image

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: yyangteam/new-api

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        run: |
          VERSION=$(bash scripts/version.sh)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "$VERSION" > VERSION

      - name: Determine Docker Tags
        id: tags
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          BRANCH_SLUG=$(echo "$BRANCH" | sed 's|/|-|g')
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${BRANCH_SLUG}-${VERSION}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${BRANCH_SLUG}"
          if [ "$BRANCH" = "dev" ]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          fi
          TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA}"
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve catalog references
        run: node web/resolve-catalogs.cjs

      - name: Build Frontend (default)
        env:
          CI: ""
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          VITE_REACT_APP_VERSION: ${{ env.VERSION }}
        run: |
          cd web/default
          npm install
          npx rsbuild build

      - name: Build Frontend (classic)
        env:
          CI: ""
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          VITE_REACT_APP_VERSION: ${{ env.VERSION }}
        run: |
          cd web/classic
          npm install
          npx rsbuild build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
