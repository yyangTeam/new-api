name: Frontend Tests

on:
  push:
    branches: ['**']
    paths:
      - 'web/default/src/**'
      - 'web/default/package.json'
      - 'web/default/vitest.config.ts'
      - 'web/classic/src/**'
      - 'web/classic/package.json'
      - 'web/classic/vitest.config.ts'
  pull_request:
    paths:
      - 'web/default/src/**'
      - 'web/default/package.json'
      - 'web/default/vitest.config.ts'
      - 'web/classic/src/**'
      - 'web/classic/package.json'
      - 'web/classic/vitest.config.ts'

jobs:
  test-default:
    name: Test Default Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/default
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

  test-classic:
    name: Test Classic Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/classic
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test
